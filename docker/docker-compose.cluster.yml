services:
  opensearch-node1:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-node1-cluster
    environment:
      - cluster.name=students-opensearch-cluster-multi
      - node.name=opensearch-node1
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_SECURITY_PLUGIN=true
      - path.repo=/mnt/snapshots
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data-cluster-1:/usr/share/opensearch/data
      - ../snapshots:/mnt/snapshots
    ports:
      - "9201:9200"
      - "9601:9600"
    networks:
      - opensearch-net

  opensearch-node2:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-node2-cluster
    environment:
      - cluster.name=students-opensearch-cluster-multi
      - node.name=opensearch-node2
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_SECURITY_PLUGIN=true
      - path.repo=/mnt/snapshots
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data-cluster-2:/usr/share/opensearch/data
      - ../snapshots:/mnt/snapshots
    ports:
      - "9202:9200"
      - "9602:9600"
    networks:
      - opensearch-net

  opensearch-node3:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-node3-cluster
    environment:
      - cluster.name=students-opensearch-cluster-multi
      - node.name=opensearch-node3
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2,opensearch-node3
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_SECURITY_PLUGIN=true
      - path.repo=/mnt/snapshots
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data-cluster-3:/usr/share/opensearch/data
      - ../snapshots:/mnt/snapshots
    ports:
      - "9203:9200"
      - "9603:9600"
    networks:
      - opensearch-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards-cluster
    ports:
      - "5602:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-node1:9200","http://opensearch-node2:9200","http://opensearch-node3:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    networks:
      - opensearch-net

volumes:
  opensearch-data-cluster-1:
  opensearch-data-cluster-2:
  opensearch-data-cluster-3:

networks:
  opensearch-net: